apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Hello World MSI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ============================================
  # STAGE 1: BUILD & TEST
  # ============================================
  build-and-test:
    steps:
      # Checkout code
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      # Run unit tests
      - name: Run unit tests
        uses: docker://python:3.11-slim
        run: |
          pip install -r requirements-dev.txt
          pytest test_app.py -v --junitxml=test-results/junit.xml --cov=app

      # Publish test results
      - name: Publish test results
        uses: cloudbees-io/publish-test-results@v1
        with:
          test-type: junit
          folder-name: test-results

      # Build Docker image
      - name: Build Docker image
        uses: cloudbees-io/kaniko@v1
        id: build
        with:
          destination: docker.io/tejasdesai27/hello-world:${{ cloudbees.scm.sha }}
          labels: version=${{ cloudbees.scm.sha }},environment=build

    outputs:
      image-tag: ${{ cloudbees.scm.sha }}

  # ============================================
  # STAGE 2: DEPLOY TO QA
  # ============================================
  deploy-qa:
    needs: build-and-test
    environment: qa
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Deploy to QA environment
        uses: cloudbees-io/kubectl-run@v1
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          command: |
            # Update deployment manifest with image tag
            sed -i "s|IMAGE_PLACEHOLDER|docker.io/tejasdesai27/hello-world:${{ needs.build-and-test.outputs.image-tag }}|g" k8s/deployment.yaml
            sed -i "s|ENV_PLACEHOLDER|qa|g" k8s/deployment.yaml
            sed -i "s|VERSION_PLACEHOLDER|${{ needs.build-and-test.outputs.image-tag }}|g" k8s/deployment.yaml

            # Apply to tejas-qa namespace
            kubectl apply -f k8s/deployment.yaml -n tejas-qa
            kubectl apply -f k8s/service.yaml -n tejas-qa

            # Wait for rollout
            kubectl rollout status deployment/hello-world -n tejas-qa --timeout=300s

      - name: Register deployed artifact - QA
        uses: cloudbees-io/register-deployed-artifact@v1
        with:
          artifact-id: docker.io/tejasdesai27/hello-world:${{ needs.build-and-test.outputs.image-tag }}
          environment: qa

      - name: Verify deployment
        uses: cloudbees-io/kubectl-run@v1
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          command: |
            kubectl get pods -n tejas-qa -l app=hello-world
            kubectl get svc -n tejas-qa hello-world

  # ============================================
  # STAGE 3: DEPLOY TO STAGING
  # ============================================
  deploy-staging:
    needs: deploy-qa
    environment: staging
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Deploy to Staging environment
        uses: cloudbees-io/kubectl-run@v1
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          command: |
            # Update deployment manifest
            sed -i "s|IMAGE_PLACEHOLDER|docker.io/tejasdesai27/hello-world:${{ needs.build-and-test.outputs.image-tag }}|g" k8s/deployment.yaml
            sed -i "s|ENV_PLACEHOLDER|staging|g" k8s/deployment.yaml
            sed -i "s|VERSION_PLACEHOLDER|${{ needs.build-and-test.outputs.image-tag }}|g" k8s/deployment.yaml

            # Apply to tejas-staging namespace
            kubectl apply -f k8s/deployment.yaml -n tejas-staging
            kubectl apply -f k8s/service.yaml -n tejas-staging

            # Wait for rollout
            kubectl rollout status deployment/hello-world -n tejas-staging --timeout=300s

      - name: Register deployed artifact - Staging
        uses: cloudbees-io/register-deployed-artifact@v1
        with:
          artifact-id: docker.io/tejasdesai27/hello-world:${{ needs.build-and-test.outputs.image-tag }}
          environment: staging

  # ============================================
  # STAGE 4: DEPLOY TO PRODUCTION
  # ============================================
  deploy-prod:
    needs:
      - deploy-staging
      - build-and-test
    environment: prod
    steps:
      - name: Checkout code
        uses: cloudbees-io/checkout@v1

      - name: Deploy to Production environment
        uses: cloudbees-io/kubectl-run@v1
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          command: |
            # Update deployment manifest
            sed -i "s|IMAGE_PLACEHOLDER|docker.io/tejasdesai27/hello-world:${{ needs.build-and-test.outputs.image-tag }}|g" k8s/deployment.yaml
            sed -i "s|ENV_PLACEHOLDER|production|g" k8s/deployment.yaml
            sed -i "s|VERSION_PLACEHOLDER|${{ needs.build-and-test.outputs.image-tag }}|g" k8s/deployment.yaml

            # Apply to tejas-prod namespace
            kubectl apply -f k8s/deployment.yaml -n tejas-prod
            kubectl apply -f k8s/service.yaml -n tejas-prod

            # Wait for rollout
            kubectl rollout status deployment/hello-world -n tejas-prod --timeout=300s

      - name: Register deployed artifact - Production
        uses: cloudbees-io/register-deployed-artifact@v1
        with:
          artifact-id: docker.io/tejasdesai27/hello-world:${{ needs.build-and-test.outputs.image-tag }}
          environment: prod

      - name: Verify production deployment
        uses: cloudbees-io/kubectl-run@v1
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          command: |
            echo "🚀 Production Deployment Complete!"
            kubectl get pods -n tejas-prod -l app=hello-world
            kubectl get svc -n tejas-prod hello-world
